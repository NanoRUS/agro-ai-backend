version: "3.9"

# Local demo: sqlite (no postgres needed)
# Production: uncomment db service and change DATABASE_URL

services:

  api:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      # Override for local dev — SQLite, no external services
      DATABASE_URL: sqlite+aiosqlite:///./agro.db
      DEBUG: "true"
    volumes:
      # Hot reload in dev (remove in production image)
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../agro-ai-frontend:/app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - api

# --- Production profile (docker compose --profile prod up) ---

  db:
    image: postgres:16-alpine
    profiles: [prod]
    environment:
      POSTGRES_USER: agro
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agro}
      POSTGRES_DB: agro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agro"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-prod:
    build: .
    profiles: [prod]
    ports:
      - "8080:8080"
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
